<!DOCTYPE html>
<html>
<head>
<title>My CI/CD Website</title>

<style>
body{
    font-family: Arial;
    background-color:#f2f2f2;
    text-align:center;
    padding:50px;
}

.container{
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
    width:400px;
    margin:auto;
}

h1{
    color:#2c3e50;
}

p{
    color:#555;
}

button{
    background:#3498db;
    color:white;
    border:none;
    padding:10px 20px;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}
</style>

</head>

<body>

<div class="container">
<h1>Welcome</h1>
<p>This website is deployed using GitHub CI/CD Pipeline.</p>
<p>Build artifacts are stored using GitHub Actions.</p>

<button>Learn DevOps</button>
</div>

</body>
</html>
