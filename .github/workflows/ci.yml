name: Static Site CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build static site
        run: |
          mkdir build
          cp cloudtask.html build/

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: site-build
          path: build/      
